services:
  backend:
    image: proxyparser-backend:${IMAGE_TAG:-local}
    container_name: proxyparser-backend
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "3001"
      DATABASE_PATH: /data/proxyparser.sqlite
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ISSUER: ${JWT_ISSUER:-proxyparser}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-zh-CN}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-2592000}
      SUBSCRIPTION_TEMP_TOKEN_TTL_SECONDS: ${SUBSCRIPTION_TEMP_TOKEN_TTL_SECONDS:-86400}
    volumes:
      - ${PROXYPARSER_DATA_DIR:-/var/lib/proxyparser}:/data
    ports:
      - "127.0.0.1:3001:3001"

  frontend:
    image: proxyparser-frontend:${IMAGE_TAG:-local}
    container_name: proxyparser-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"
